# Worksheet State: team key lives in repo secret WORKSHEET_STATE_TEAM_KEY or WOF_TEAM_KEY.
# Userscript sends repository_dispatch with the same key in client_payload; this workflow writes
# WORKSHEET STATES/worksheet-states.json using GITHUB_TOKEN.
name: Worksheet State sync

on:
  repository_dispatch:
    types: [worksheet-state-put]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate team key and write JSON
        uses: actions/github-script@v7
        env:
          WORKSHEET_STATE_TEAM_KEY: ${{ secrets.WORKSHEET_STATE_TEAM_KEY }}
          WOF_TEAM_KEY: ${{ secrets.WOF_TEAM_KEY }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const core = require('@actions/core');
            const expected = process.env.WORKSHEET_STATE_TEAM_KEY || process.env.WOF_TEAM_KEY;
            const cp = context.payload.client_payload || {};
            const got = cp.team_key;
            if (!expected) {
              core.setFailed('Repository secret WORKSHEET_STATE_TEAM_KEY or WOF_TEAM_KEY is not set.');
              return;
            }
            if (String(got) !== String(expected)) {
              core.setFailed('Invalid team key.');
              return;
            }
            const doc = cp.document;
            if (!doc || typeof doc !== 'object' || !Array.isArray(doc.states)) {
              core.setFailed('client_payload.document must be { states: [], updatedAt?: number }');
              return;
            }
            const now = Date.now();
            const ttlMs = Number(doc.ttlMs) || 4 * 60 * 60 * 1000;
            doc.updatedAt = Number(doc.updatedAt) || now;
            doc.ttlMs = ttlMs;
            doc.states = doc.states
              .filter((state) => state && typeof state === 'object')
              .filter((state) => {
                const expiresAt = Date.parse(state.expiresAt || '');
                return Number.isFinite(expiresAt) ? expiresAt > now : true;
              });
            let rel = (cp.path && String(cp.path).trim()) || 'WORKSHEET STATES/worksheet-states.json';
            rel = rel.replace(/^\/+/, '').replace(/\.\./g, '');
            const dir = path.dirname(rel);
            if (dir && dir !== '.') {
              fs.mkdirSync(dir, { recursive: true });
            }
            fs.writeFileSync(rel, JSON.stringify(doc, null, 2) + '\n', 'utf8');
            fs.writeFileSync('worksheet-state-git-path.txt', rel, 'utf8');

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          REL="$(cat worksheet-state-git-path.txt)"
          git add -- "$REL"
          rm -f worksheet-state-git-path.txt
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Worksheet states: sync from repository_dispatch"
          git push
