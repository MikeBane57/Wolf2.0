# Policy: only `main` and `test` may receive pushes. Delete any other remote branches.
# For stronger enforcement, add a GitHub ruleset (Settings → Rules → Rulesets) to restrict
# branch creation, or require PRs from forks only.
name: Allowed branches only

on:
  push:
    branches-ignore:
      - main
      - test

jobs:
  reject:
    runs-on: ubuntu-latest
    steps:
      - name: Reject disallowed branch
        run: |
          echo "::error title=Branch not allowed::This repository only allows branches 'main' and 'test'. Remove this branch and use main or test instead. Ref: ${GITHUB_REF}"
          exit 1
